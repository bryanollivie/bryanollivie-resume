name: iosApp
options:
  bundleIdPrefix: com.bryanollivie
  deploymentTarget:
    iOS: "16.0"
settings:
  DEVELOPMENT_TEAM: "483SV5U2UC"
targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.bryanollivie.resume
      INFOPLIST_FILE: iosApp/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      FRAMEWORK_SEARCH_PATHS[sdk=iphoneos*]:
        - "$(SRCROOT)/../composeApp/build/bin/iosArm64/debugFramework"
      FRAMEWORK_SEARCH_PATHS[sdk=iphonesimulator*]:
        - "$(SRCROOT)/../composeApp/build/bin/iosSimulatorArm64/debugFramework"
      OTHER_LDFLAGS:
        - "-framework"
        - "ComposeApp"
    dependencies: []
    preBuildScripts:
      - name: "Copy Compose Resources"
        script: |
          cd "${SRCROOT}/.."
          ./gradlew :composeApp:copyComposeResourcesForIos \
            -Pcompose.resources.dir="${TARGET_BUILD_DIR}/${PRODUCT_NAME}.app" \
            2>/dev/null || true
          RESOURCES_DIR="${SRCROOT}/../composeApp/build/compose/cocoapods/compose-resources"
          if [ -d "$RESOURCES_DIR" ]; then
            mkdir -p "${TARGET_BUILD_DIR}/${PRODUCT_NAME}.app/compose-resources"
            cp -R "$RESOURCES_DIR/" "${TARGET_BUILD_DIR}/${PRODUCT_NAME}.app/compose-resources/"
          fi
          GENERATED_RES="${SRCROOT}/../composeApp/src/commonMain/composeResources"
          if [ -d "$GENERATED_RES" ]; then
            mkdir -p "${TARGET_BUILD_DIR}/${PRODUCT_NAME}.app/compose-resources/composeResources/bryanresume.composeapp.generated.resources"
            cp -R "$GENERATED_RES/" "${TARGET_BUILD_DIR}/${PRODUCT_NAME}.app/compose-resources/composeResources/bryanresume.composeapp.generated.resources/"
          fi
        basedOnDependencyAnalysis: false
